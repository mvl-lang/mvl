[package]
name             = "sqlite"
version          = "0.1.0"
license          = "Apache-2.0"
requires-mvl     = ">=0.90.0"
extern-rationale = "wraps rusqlite (bundled SQLite C library); zero system sqlite3 dependency"

# Rust backend: bridge.rs uses rusqlite directly.
# LLVM backend: llvm.rs exposes the same symbols as extern "C" — wired via #811.
[native]
rusqlite = { version = "0.31", features = ["bundled"] }
