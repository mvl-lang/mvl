[package]
name = "mvl_language"
version = "0.1.0"
license = "Apache-2.0"
requires-mvl = ">=0.168.0"

[dependencies]
"github.com/mvl-lang/pkg-anthropic" = { git = "https://github.com/mvl-lang/pkg-anthropic", tag = "v0.1.0", rationale = "Anthropic Claude API SDK — typed message protocol, auth, streaming" }
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.2.0", rationale = "HTTP routing, request parsing, and response serialization — 2k+ LOC protocol implementation" }
"github.com/mvl-lang/pkg-sqlite" = { git = "https://github.com/mvl-lang/pkg-sqlite", tag = "v0.1.3", rationale = "SQLite FFI bindings via rusqlite — native code, not generatable" }
"github.com/mvl-lang/pkg-tls" = { git = "https://github.com/mvl-lang/pkg-tls", tag = "v0.1.0", rationale = "TLS via rustls — crypto and X.509, never generate" }
"github.com/mvl-lang/pkg-zmq" = { git = "https://github.com/mvl-lang/pkg-zmq", tag = "v0.2.0", rationale = "ZMTP 3.x wire protocol — 3k+ LOC framing, handshake, and socket patterns" }
