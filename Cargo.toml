[workspace]
members = [".", "mvl_runtime"]

[package]
name = "mvl"
version = "0.55.0"
edition = "2021"
description = "MVL — Minimum Verification Language compiler"
license = "Apache-2.0"

[features]
# Enable LLVM backend via inkwell. Requires LLVM 22 installed.
# macOS homebrew: LLVM_SYS_221_PREFIX=/opt/homebrew/opt/llvm cargo build --features llvm
llvm = ["dep:inkwell"]

[dependencies]
ureq = "2"
tempfile = "3"
inkwell = { version = "0.9", features = ["llvm22-1"], optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
