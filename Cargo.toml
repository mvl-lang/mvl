[workspace]
members = [".", "mvl_runtime", "mvl_memory"]
exclude = ["fuzz"]

[package]
name = "mvl"
version = "0.68.0"
edition = "2021"
description = "MVL — Minimum Verification Language compiler"
license = "Apache-2.0"

[features]
# LLVM backend is on by default. Requires LLVM 22 installed.
# macOS homebrew: brew install llvm  (path set via .cargo/config.toml)
# To build without LLVM: cargo build --no-default-features
default = ["llvm"]
llvm = ["dep:inkwell"]

[dependencies]
ureq = "2"
tempfile = "3"
inkwell = { version = "0.9", features = ["llvm22-1"], optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
