# Build configuration for MVL compiler.
#
# LLVM backend (--features llvm):
#   macOS homebrew installs LLVM as keg-only at /opt/homebrew/opt/llvm.
#   LLVM_SYS_221_PREFIX points llvm-sys to the correct installation.
#   Override with an env var if your LLVM 22 lives elsewhere.

[env]
LLVM_SYS_221_PREFIX = { value = "/opt/homebrew/opt/llvm", force = false }
