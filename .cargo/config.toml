# Build configuration for MVL compiler.
#
# LLVM backend (default feature, requires LLVM 22 installed):
#   macOS homebrew (keg-only): add to PATH or set env before building:
#     export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
#   Linux: install llvm-22 (apt install llvm-22) — llvm-sys finds it via llvm-config-22.
#   CI: sets LLVM_SYS_221_PREFIX dynamically in .github/workflows/ci.yml.
#   Build without LLVM: cargo build --no-default-features
#
# Z3 backend (default feature, requires Z3 4.x):
#   macOS homebrew: brew install z3
#   Linux: apt install libz3-dev  (or equivalent)
#   Build without Z3: cargo build --features llvm --no-default-features

# Z3_SYS_Z3_HEADER lets z3-sys's build.rs find z3.h (bindgen).
# force=false: only applied when not already set in the environment.
# macOS arm64 homebrew default; Linux CI must set Z3_SYS_Z3_HEADER=/usr/include/z3.h
# to prevent this macOS path from being used on the Linux runner.
[env]
Z3_SYS_Z3_HEADER = { value = "/opt/homebrew/include/z3.h", force = false }
