site_name: MVL — Minimum Verification Language
site_description: The smallest language where the compiler verifies the most
site_author: Ilja Heitlager
repo_url: https://github.com/LAB271/mvl_language
repo_name: LAB271/mvl_language

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Rationale: mvl_rationale.md
  - The Eleven Requirements: requirements.md
  - Roadmap: roadmap.md
  - Language Manual:
    - Overview: manual/index.md
    - 1. Lexical Structure: manual/01-lexical.md
    - 2. Types: manual/02-types.md
    - 3. Declarations: manual/03-declarations.md
    - 4. Statements: manual/04-statements.md
    - 5. Expressions: manual/05-expressions.md
    - 6. Pattern Matching: manual/06-patterns.md
    - 7. Ownership and Borrowing: manual/07-ownership.md
    - 8. Effect System: manual/08-effects.md
    - 9. Totality and Termination: manual/09-totality.md
    - 10. Information Flow Control: manual/10-ifc.md
    - 11. Refinement Types: manual/11-refinements.md
    - 12. Concurrency: manual/12-concurrency.md
    - 13. Module System: manual/13-modules.md
    - 14. Foreign Function Interface: manual/14-ffi.md
    - 15. Error Handling: manual/15-errors.md
    - 16. Standard Library: manual/16-stdlib.md
    - 17. Compilation Model: manual/17-compilation.md
    - 18. Keywords Reference: manual/18-keywords.md
    - 19. Operators and Precedence: manual/19-operators.md
    - 20. Grammar: manual/20-grammar.md
    - 21. Testing Strategy: manual/21-testing.md
  - Quick Reference:
    - Language Reference: language.md
    - Grammar (EBNF): grammar.md
    - Standard Library: stdlib.md
    - How MVL Compiles: compilation-model.md
  - Design:
    - Overview: adr/index.md
    - ADR-0001 Eleven Requirements: adr/0001-eleven-requirements.md
    - ADR-0002 Language Contraction: adr/0002-language-contraction.md
    - ADR-0003 Compilation Strategy: adr/0003-compilation-strategy.md
    - ADR-0004 Language Size: adr/0004-language-size.md
    - ADR-0005 Recursive Descent Parser: adr/0005-recursive-descent-parser.md
  - Specs:
    - 000 Parser: specs/000-parser.md
    - 001 Type System: specs/001-type-system.md
    - 002 Effect System: specs/002-effect-system.md
    - 003 Information Flow: specs/003-information-flow.md
    - 005 Modules: specs/005-modules.md
  - References: references.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      base_path: docs
  - attr_list
