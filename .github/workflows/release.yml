name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v0.10.2, v1.0.0
  workflow_dispatch:  # Allow manual trigger
    inputs:
      version:
        description: 'Version to build (e.g., 0.10.2)'
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: mvl

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
            VERSION="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package binary
        shell: bash
        run: |
          ASSET="${BINARY_NAME}-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${BINARY_NAME}"
          tar czf "${ASSET}" "${BINARY_NAME}"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 7

  package-stdlib:
    name: Package Stdlib
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package stdlib tarball
        run: |
          # Keyed on the compiler version so `mvl self install <ver>` can find
          # the artifact without prior knowledge of the stdlib version that
          # shipped with that release (matches how the runtime tarball is
          # looked up).
          ASSET="mvl-stdlib-${{ steps.version.outputs.version }}.tar.gz"
          # Layout inside the archive: `std/*.mvl` — extractor drops it under
          # `<mvl_data_home>/toolchains/{compiler_ver}/` so the final path is
          # `<mvl_data_home>/toolchains/{compiler_ver}/std/*.mvl`.
          tar czf "${ASSET}" std
          echo "STDLIB_ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Upload stdlib artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mvl-stdlib-${{ steps.version.outputs.version }}
          path: ${{ env.STDLIB_ASSET }}
          retention-days: 7

  package-runtime:
    name: Package Runtime
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Read runtime version
        id: runtime_version
        run: |
          VERSION=$(grep '^version' runtime/rust/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package runtime tarball
        run: |
          ASSET="mvl-runtime-${{ steps.runtime_version.outputs.version }}.tar.gz"
          tar czf "${ASSET}" \
            --transform 's|^runtime/rust|rust|' \
            --transform 's|^runtime/rust-tokio|rust-tokio|' \
            runtime/rust \
            runtime/rust-tokio
          echo "RUNTIME_ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "RUNTIME_VERSION=${{ steps.runtime_version.outputs.version }}" >> "$GITHUB_ENV"

      - name: Upload runtime artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mvl-runtime-${{ steps.runtime_version.outputs.version }}
          path: ${{ env.RUNTIME_ASSET }}
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build, package-runtime, package-stdlib]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
