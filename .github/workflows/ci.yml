name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Path detection ──────────────────────────────────────────────────────────
  #
  # Mirrors the pre-commit hook's path-aware filtering: only run a job suite
  # when the relevant files actually changed.
  #
  #   rust     — .rs files or Cargo.* (triggers: fmt, clippy, build, test)
  #   compiler — compiler/**          (triggers: check-compiler, test-mvl)
  #   openspec — .openspec/**         (triggers: adr-check)
  #
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      compiler: ${{ steps.filter.outputs.compiler }}
      openspec: ${{ steps.filter.outputs.openspec }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2

      - name: Fetch base SHA for PR diff
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: Detect changed files
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          else
            # push to main: compare with parent; fall back to all files on first commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          fi
          echo "$CHANGED" | grep -qE '\.rs$|^Cargo\.' && RUST=true     || RUST=false
          echo "$CHANGED" | grep -qE '^compiler/'      && COMPILER=true || COMPILER=false
          echo "$CHANGED" | grep -qE '^\.openspec/'    && OPENSPEC=true || OPENSPEC=false
          echo "rust=$RUST"         >> "$GITHUB_OUTPUT"
          echo "compiler=$COMPILER" >> "$GITHUB_OUTPUT"
          echo "openspec=$OPENSPEC" >> "$GITHUB_OUTPUT"

  # ── ISPE Assurance ──────────────────────────────────────────────────────────
  #
  # Overall spec-coverage metric. Runs on every PR regardless of which files
  # changed — it measures the project as a whole. Reports only, does not block.
  assurance:
    name: ISPE Assurance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run assurance report
        id: assurance
        run: |
          # Threshold tracking (issue #36) — report only, no blocking:
          #   Epic 1 complete (parser):          0.25
          #   Epic 2 complete (type checker):    0.50
          #   Epic 3+4 complete (effects + IFC): 0.75  ← target
          #   Epic 5 complete (transpiler):      0.90
          # Current: ~0.69 (Phase 8 in progress)
          OUTPUT=$(python3 tools/assurance.py 2>&1)
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          DELIM=$(openssl rand -hex 16)
          printf '%s\n' "report<<${DELIM}" "$CLEAN" "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        env:
          ASSURANCE_REPORT: ${{ steps.assurance.outputs.report }}
        with:
          script: |
            const report = process.env.ASSURANCE_REPORT;
            const body = `## ISPE Assurance Report\n\n\`\`\`\n${report}\n\`\`\`\n\n🤖 *Generated by CI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.includes('## ISPE Assurance Report') && c.body.includes('Generated by CI')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── ADR structure check ─────────────────────────────────────────────────────
  #
  # Only needed when spec or ADR files change.
  adr-check:
    name: ADR structure check
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && needs.changes.outputs.openspec == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check ADR structure
        run: python3 tools/check_adr.py --verbose

  # ── Rust build + test + MVL compiler checks ─────────────────────────────────
  #
  # Runs when Rust sources changed OR compiler/ MVL sources changed:
  #   - Rust changed   → fmt, clippy, cargo test, validate-keywords
  #   - compiler/ changed → make check-compiler, make test-mvl
  #   - Both           → all of the above (one build, binary reused)
  check:
    name: Check, lint, test
    needs: [changes]
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.compiler == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install LLVM 22
        run: |
          # Install LLVM 22 from the official apt.llvm.org repository.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-22-dev libclang-22-dev libpolly-22-dev libz3-dev
          echo "LLVM_SYS_221_PREFIX=$(llvm-config-22 --prefix)" >> "$GITHUB_ENV"
          # Override .cargo/config.toml's macOS default so z3-sys uses the Linux system header.
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"

      - name: Check formatting
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt -- --check

      - name: Clippy (lint)
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Build mvl_runtime_c cdylib
        run: cargo build -p mvl_runtime_c

      - name: Validate keyword consistency
        if: needs.changes.outputs.rust == 'true'
        run: make validate-keywords

      - name: Test (fast — unit + type_checker)
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --lib --test type_checker --test parser --test requirements

      - name: Test (full — integration)
        if: needs.changes.outputs.rust == 'true' && github.event_name == 'push'
        run: cargo test --test compile_and_run --test cross_backend --test stdlib

      - name: MVL check compiler
        if: needs.changes.outputs.compiler == 'true'
        run: make check-compiler

      # test-mvl temporarily disabled — self-hosted compiler format migration
      # still in progress. Re-enable when compiler/*.mvl is fully migrated.
      # - name: MVL test compiler
      #   if: needs.changes.outputs.compiler == 'true'
      #   run: make test-mvl

  # ── Refinement solver benchmarks ────────────────────────────────────────────
  #
  # Runs when Rust sources change. Uses a small sample count so CI completes
  # in ~2 minutes; results are uploaded as an artifact for regression tracking.
  # Use `--output-format bencher` to produce machine-readable output that can
  # be diffed across runs to detect performance regressions.
  benchmark:
    name: Refinement solver benchmarks
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install LLVM 22 and Z3
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-22-dev libclang-22-dev libpolly-22-dev libz3-dev
          echo "LLVM_SYS_221_PREFIX=$(llvm-config-22 --prefix)" >> "$GITHUB_ENV"
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"

      - name: Run benchmarks
        run: |
          cargo bench --bench refinement_solver \
            -- --output-format bencher 2>&1 | tee bench-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: refinement-bench-results
          path: bench-results.txt
          retention-days: 90
