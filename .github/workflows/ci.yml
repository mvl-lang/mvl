name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # в”Ђв”Ђ Path detection в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Mirrors the pre-commit hook's path-aware filtering: only run a job suite
  # when the relevant files actually changed.
  #
  #   rust     вЂ” .rs files or Cargo.* (triggers: fmt, clippy, build, test)
  #   compiler вЂ” compiler/**          (triggers: check-compiler, test-mvl)
  #   openspec вЂ” .openspec/**         (triggers: adr-check)
  #
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      compiler: ${{ steps.filter.outputs.compiler }}
      openspec: ${{ steps.filter.outputs.openspec }}
      examples: ${{ steps.filter.outputs.examples }}
      mvl: ${{ steps.filter.outputs.mvl }}
      code: ${{ steps.filter.outputs.code }}
      release: ${{ steps.filter.outputs.release }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2

      - name: Fetch base SHA for PR diff
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: Detect changed files
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          else
            # push to main: compare with parent; fall back to all files on first commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          fi
          # `rust` retriggers the check job. Include workflow + tools/ so
          # CI-config and mvlr changes get validated end-to-end (#1823).
          echo "$CHANGED" | grep -qE '\.rs$|^Cargo\.|^\.github/workflows/|^tools/'   && RUST=true     || RUST=false
          echo "$CHANGED" | grep -qE '^compiler/'        && COMPILER=true || COMPILER=false
          echo "$CHANGED" | grep -qE '^\.openspec/'      && OPENSPEC=true || OPENSPEC=false
          echo "$CHANGED" | grep -qE '^examples/|^std/'  && EXAMPLES=true || EXAMPLES=false
          echo "$CHANGED" | grep -qE '\.mvl$'            && MVL=true      || MVL=false
          # code=true when any source file changed (gates assurance + heavy jobs)
          { [ "$RUST" = true ] || [ "$COMPILER" = true ] || [ "$EXAMPLES" = true ] || [ "$MVL" = true ]; } \
            && CODE=true || CODE=false
          # release=true when ONLY version/changelog files changed (chore: release vX.Y.Z)
          RELEASE=false
          if [ -n "$CHANGED" ]; then
            ONLY=true
            while IFS= read -r f; do
              case "$f" in Cargo.toml|Cargo.lock|CHANGELOG.md) ;; *) ONLY=false; break ;; esac
            done <<< "$CHANGED"
            [ "$ONLY" = true ] && RELEASE=true
          fi
          echo "rust=$RUST"         >> "$GITHUB_OUTPUT"
          echo "compiler=$COMPILER" >> "$GITHUB_OUTPUT"
          echo "openspec=$OPENSPEC" >> "$GITHUB_OUTPUT"
          echo "examples=$EXAMPLES" >> "$GITHUB_OUTPUT"
          echo "mvl=$MVL"           >> "$GITHUB_OUTPUT"
          echo "code=$CODE"         >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE"   >> "$GITHUB_OUTPUT"

  # в”Ђв”Ђ ISPE Assurance в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Overall spec-coverage metric. Runs on every PR regardless of which files
  # changed вЂ” it measures the project as a whole. Reports only, does not block.
  assurance:
    name: ISPE Assurance
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && needs.changes.outputs.code == 'true' && needs.changes.outputs.release != 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run assurance report
        id: assurance
        run: |
          # Threshold tracking (issue #36) вЂ” report only, no blocking:
          #   Epic 1 complete (parser):          0.25
          #   Epic 2 complete (type checker):    0.50
          #   Epic 3+4 complete (effects + IFC): 0.75  в†ђ target
          #   Epic 5 complete (transpiler):      0.90
          # Current: ~0.69 (Phase 8 in progress)
          OUTPUT=$(python3 tools/assurance.py 2>&1)
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          DELIM=$(openssl rand -hex 16)
          printf '%s\n' "report<<${DELIM}" "$CLEAN" "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        env:
          ASSURANCE_REPORT: ${{ steps.assurance.outputs.report }}
        with:
          script: |
            const report = process.env.ASSURANCE_REPORT;
            const body = `## ISPE Assurance Report\n\n\`\`\`\n${report}\n\`\`\`\n\nрџ¤– *Generated by CI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.includes('## ISPE Assurance Report') && c.body.includes('Generated by CI')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # в”Ђв”Ђ ADR structure check в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Only needed when spec or ADR files change.
  adr-check:
    name: ADR structure check
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && needs.changes.outputs.openspec == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check ADR structure
        run: python3 tools/check_adr.py --verbose

  # в”Ђв”Ђ Rust build + test + MVL compiler checks в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Runs when Rust sources changed OR compiler/ MVL sources changed:
  #   - Rust changed   в†’ fmt, clippy, cargo test, validate-keywords
  #   - compiler/ changed в†’ make check-compiler, make test-mvl
  #   - Both           в†’ all of the above (one build, binary reused)
  check:
    name: Check, lint, test
    needs: [changes]
    if: (needs.changes.outputs.rust == 'true' || needs.changes.outputs.compiler == 'true') && needs.changes.outputs.release != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install LLVM 22 + Z3
        run: |
          # Install LLVM 22 (provides lli for LLVM text backend) and Z3.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-22 libz3-dev
          # Override .cargo/config.toml's macOS defaults for Linux.
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Check formatting
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt -- --check

      - name: Clippy (lint)
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy -- -D warnings

      - name: Audit backend parser::ast references (ADR-0050)
        if: needs.changes.outputs.rust == 'true'
        # Budget 1: wasm_text.rs imports parser::ast::{BinaryOp, Literal} вЂ”
        # tracked in #1825, must return to 0 once TIR owns its own variants.
        run: python3 tools/audit_backend_ast.py --budget 1

      - name: Build
        run: cargo build

      - name: Build mvl_runtime_llvm cdylib
        run: cargo build -p mvl_runtime_llvm

      - name: Validate keyword consistency
        if: needs.changes.outputs.rust == 'true'
        run: make validate-keywords

      - name: Test (fast вЂ” unit + type_checker)
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --lib --test type_checker --test parser --test requirements

      - name: Test (full вЂ” integration)
        if: needs.changes.outputs.rust == 'true' && github.event_name == 'push'
        run: cargo test --test compile_and_run --test cross_backend --test stdlib

      # New corpus matrix (#1823 phase 2) вЂ” three active anchors via tools/mvlr.
      # `install-runtime` places stdlib + runtime crates + libmvl_runtime_llvm.so
      # under ~/.local/share/mvl/ so `mvl test` can resolve them (matches the
      # layout an end user gets from `make install`). Uses the debug artifacts
      # already built by earlier steps вЂ” no release rebuild.
      # LLVM 22 is installed under /usr/lib/llvm-22 by apt (not on PATH);
      # prepend its bin/ so `mvl`'s find_lli()/find_llc() succeed and pin
      # LLC for the bootstrap chain in test-mvl-llvm.
      - name: Test matrix (rust/rust + rust/llvm + mvl/llvm)
        if: needs.changes.outputs.rust == 'true'
        env:
          LLC: /usr/lib/llvm-22/bin/llc
        run: |
          export PATH=/usr/lib/llvm-22/bin:$PATH
          make install-runtime
          make test-rust-rust
          make test-rust-llvm
          make test-mvl-llvm

      # Regression net for emitter-emission bugs like #1671.  Every corpus
      # file that builds successfully must produce warning-free Rust.
      # Files with pre-existing legitimate warnings (e.g. linter negative
      # tests) or known unfixed emitter smells are opted out with a
      # `corpus:expect-warnings` marker + follow-up ticket reference.
      # Slow (~6 min at full corpus), so gated on Rust changes only.
      - name: Test corpus emits warning-free Rust
        if: needs.changes.outputs.rust == 'true'
        run: make test-corpus-warnings-old

      - name: MVL check compiler
        if: needs.changes.outputs.compiler == 'true'
        run: make check-compiler

      # test-mvl temporarily disabled вЂ” self-hosted compiler format migration
      # still in progress. Re-enable when compiler/*.mvl is fully migrated.
      # - name: MVL test compiler
      #   if: needs.changes.outputs.compiler == 'true'
      #   run: make test-mvl

  # в”Ђв”Ђ Example smoke tests в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Runs test-all.sh --full when examples/ or std/ files change.
  # Builds the MVL compiler, then check+test-solver+test+smoke for every example.
  examples:
    name: Example smoke tests
    needs: [changes]
    if: (needs.changes.outputs.examples == 'true' || needs.changes.outputs.rust == 'true') && needs.changes.outputs.release != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-22
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Build MVL compiler and runtime
        run: |
          cargo build --no-default-features
          cargo build -p mvl_runtime_llvm

      - name: Set up runtime for CI (dev fallback)
        run: |
          # For dev/CI: link the source runtime to the XDG location so mvl run can find it.
          # When the runtime is released to GitHub, this step becomes unnecessary.
          RUNTIME_VERSION=$(grep '^version' runtime/rust/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          RUNTIME_HOME="${HOME}/.local/share/mvl/runtime/${RUNTIME_VERSION}"
          mkdir -p "${RUNTIME_HOME}"
          [ -e "${RUNTIME_HOME}/rust" ] || ln -s "${{ github.workspace }}/runtime/rust" "${RUNTIME_HOME}/rust"
          [ -e "${RUNTIME_HOME}/rust-tokio" ] || ln -s "${{ github.workspace }}/runtime/rust-tokio" "${RUNTIME_HOME}/rust-tokio"

      - name: Run example smoke tests
        run: bash examples/test-all.sh --full

  # в”Ђв”Ђ Refinement solver benchmarks в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Runs on push to main only (not PRs). Benchmarks have no baseline to diff
  # against during a PR, so they add ~5 min of wall time with no signal.
  # Results are uploaded as artifacts for post-merge regression tracking.
  benchmark:
    name: Refinement solver benchmarks
    needs: [changes]
    if: needs.changes.outputs.rust == 'true' && github.event_name == 'push' && needs.changes.outputs.release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install Z3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libz3-dev
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Run benchmarks
        run: |
          cargo bench --bench refinement_solver \
            -- --output-format bencher 2>&1 | tee bench-results.txt

      - name: Store and compare benchmark results
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba  # v1.22.1
        with:
          tool: cargo
          output-file-path: bench-results.txt
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: data
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Alert (comment on commit) if any benchmark regresses more than 30%.
          # Does not fail the job вЂ” regressions are noise until reproduced.
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
