name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  assurance:
    name: ISPE Assurance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run assurance report
        id: assurance
        run: |
          # Threshold ratchet (issue #36):
          #   Epic 1 complete (parser):          --min 0.25
          #   Epic 2 complete (type checker):    --min 0.50  ← current
          #   Epic 3+4 complete (effects + IFC): --min 0.75
          #   Epic 5 complete (transpiler):      --min 0.90
          OUTPUT=$(python3 tools/assurance.py --min 0.50 2>&1)
          EXIT_CODE=$?
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          DELIM=$(openssl rand -hex 16)
          printf '%s\n' "report<<${DELIM}" "$CLEAN" "${DELIM}" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment on PR
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        env:
          ASSURANCE_REPORT: ${{ steps.assurance.outputs.report }}
        with:
          script: |
            const report = process.env.ASSURANCE_REPORT;
            const body = `## ISPE Assurance Report\n\n\`\`\`\n${report}\n\`\`\`\n\n🤖 *Generated by CI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.includes('## ISPE Assurance Report') && c.body.includes('Generated by CI')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  check:
    name: Check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Locate LLVM 22 (required by default feature)
        run: |
          PREFIX=$(llvm-config-22 --prefix 2>/dev/null || llvm-config --prefix 2>/dev/null || echo "")
          if [ -z "$PREFIX" ]; then
            echo "LLVM 22 not found via llvm-config — installing"
            sudo apt-get install -y llvm-22 libllvm22 llvm-22-dev
            PREFIX=$(llvm-config-22 --prefix)
          fi
          echo "LLVM_SYS_221_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          echo "Found LLVM at: $PREFIX"

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy (lint)
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
