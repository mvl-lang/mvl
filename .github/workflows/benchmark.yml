name: Benchmark

on:
  schedule:
    # Nightly at 02:00 UTC — stable environment, no PR noise.
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Refinement solver benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install Z3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libz3-dev
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Run benchmarks
        run: |
          cargo bench --bench refinement_solver \
            -- --output-format bencher | tee bench-results.txt

      - name: Store and compare benchmark results
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba  # v1.22.1
        with:
          tool: cargo
          output-file-path: bench-results.txt
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: data
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Alert (comment on commit) if any benchmark regresses more than 30%.
          # Does not fail the job — regressions are noise until reproduced.
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
