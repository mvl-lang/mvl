# Schema for LLM-generated MVL attempt records
#
# Each attempt file lives alongside the corresponding .mvl program.
# Naming convention:  NNN_description.mvl  +  NNN_description.attempt.yaml
#
# Related issue: #685
# Analysis insights feed back to #675 (error message improvements).

$schema: "https://mvl-lang.org/schemas/llm-attempt/v1"

required:
  - source
  - prompt
  - attempt
  - code
  - error
  - fixed
  - category

properties:
  source:
    type: string
    description: "LLM that generated the code"
    examples: ["claude-sonnet-4", "gpt-4o", "gemini-1.5-pro"]

  prompt:
    type: string
    description: "The natural-language task given to the LLM"
    examples: ["Write a function that divides two integers safely"]

  attempt:
    type: integer
    minimum: 1
    description: "Attempt number (1 = first try, 2 = after first error, etc.)"

  code:
    type: string
    description: "The MVL code generated by the LLM for this attempt"

  error:
    type: string
    nullable: true
    description: >
      The first error message produced by `mvl check`.
      null if the code compiled successfully.

  fixed:
    type: boolean
    description: "True if this attempt produced code that passes `mvl check`"

  category:
    type: string
    description: "Error category for analysis"
    enum:
      - refinement-missing      # forgot `where self != 0` or similar
      - refinement-wrong        # wrong predicate (e.g. > 0 vs != 0)
      - contract-missing        # forgot requires / ensures
      - effect-missing          # forgot ! Effect annotation
      - effect-wrong            # wrong effect declared
      - syntax-error            # invalid MVL syntax
      - type-error              # type mismatch not related to refinements
      - totality-error          # missing partial / total annotation
      - ifc-error               # security label violation
      - ownership-error         # linear type consumed twice
      - unknown                 # does not fit other categories
      - success                 # code compiled on first try (no error)

  self_healed:
    type: boolean
    description: "True if fixed after receiving the error message (attempt > 1 succeeded)"
    default: false

  attempts_to_success:
    type: integer
    nullable: true
    description: "How many attempts before fixed=true; null if never fixed"

  notes:
    type: string
    nullable: true
    description: "Human or automated annotations about this failure mode"

# Example record:
#
# source: claude-sonnet-4
# prompt: "Write a function that safely divides two integers"
# attempt: 1
# code: |
#   fn divide(a: Int, b: Int) -> Int {
#       a / b
#   }
# error: "E0042: argument `b` passed to `safe_divide` may violate refinement `self != 0`"
# fixed: false
# category: refinement-missing
# self_healed: false
# attempts_to_success: 2
# notes: "LLM forgot to add `where self != 0` constraint on b"
