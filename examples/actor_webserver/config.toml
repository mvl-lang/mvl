# actor_webserver — local configuration
# Overrides compiled-in defaults.
# Env vars (WEBSERVER_HOST, WEBSERVER_PORT, WEBSERVER_DEBUG,
#           WEBSERVER_LOG_LEVEL, WEBSERVER_LOG_FORMAT) take the next layer.
# CLI args (--host, --port, --debug, --log-level, --log-format) take the highest priority.

host       = "127.0.0.1"
port       = 8000
debug      = false
log_level  = "debug"    # debug | info | warn | error
log_format = "logfmt"   # plain | logfmt | json
