[package]
name = "crud_api"
version = "0.2.1"
license = "Apache-2.0"
requires-mvl = ">=0.161.2"

[dependencies]
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.1.1", rationale = "HTTP routing, request parsing, and REST helpers — 2k+ LOC protocol implementation" }
"github.com/mvl-lang/pkg-sqlite" = { git = "https://github.com/mvl-lang/pkg-sqlite", tag = "v0.1.1", rationale = "SQLite FFI bindings via rusqlite — native code, not generatable" }
