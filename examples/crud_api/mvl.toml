[package]
name = "crud_api"
version = "0.2.3"
license = "Apache-2.0"
requires-mvl = ">=0.184.0"

[dependencies]
"github.com/mvl-lang/pkg-sqlite" = { git = "https://github.com/mvl-lang/pkg-sqlite", tag = "v0.1.3", rationale = "SQLite driver for persistent storage of user records and API data" }
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.2.0", rationale = "HTTP routing, request parsing, and response serialization for the REST API" }
