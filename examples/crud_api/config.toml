# crud_api — local configuration
# Overrides compiled-in defaults.
# Env vars (CRUD_API_HOST, CRUD_API_PORT, CRUD_API_DB_PATH,
#           CRUD_API_SEED_FILE, CRUD_API_LOG_LEVEL, CRUD_API_LOG_FORMAT)
#           take the next layer.
# CLI args (--host, --port, --db-path, --seed-file, --log-level, --log-format)
#           take the highest priority.

host       = "127.0.0.1"
port       = 8080
db_path    = "/tmp/crud_api.db"
seed_file  = "users.csv"
log_level  = "debug"     # debug | info | warn | error
log_format = "plain"    # plain | logfmt | json
